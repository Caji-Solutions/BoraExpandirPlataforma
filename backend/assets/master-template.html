<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrato Bora Expandir</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', Times, serif;
    font-size: 11pt;
    color: #111;
    background: #fff;
    position: relative;
  }

  /* ─── MARCA D'ÁGUA: apenas logo, sem texto duplicado ─── */
  .watermark-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .watermark-logo {
    width: 320px;
    height: auto;
    opacity: 0.06;
    filter: grayscale(100%);
  }

  .watermark-text-fallback {
    font-family: Georgia, serif;
    font-size: 64pt;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #000;
    opacity: 0.04;
    text-align: center;
    line-height: 1.1;
    user-select: none;
  }

  /* ─── CONTEUDO PRINCIPAL ─── */
  .content {
    position: relative;
    z-index: 1;
    padding: 8mm 22mm 8mm 22mm;
  }

  /* ─── TIPOGRAFIA ─── */
  h1 {
    font-family: Georgia, serif;
    font-size: 11.5pt;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 22pt;
    text-decoration: underline;
    line-height: 1.5;
  }

  h2 {
    font-family: Georgia, serif;
    font-size: 11pt;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 20pt 0 10pt 0;
    line-height: 1.4;
  }

  h3 {
    font-family: Georgia, serif;
    font-size: 11pt;
    font-weight: 700;
    text-decoration: underline;
    margin: 12pt 0 6pt 0;
  }

  p {
    font-size: 10.5pt;
    line-height: 1.65;
    text-align: justify;
    margin-bottom: 9pt;
    hyphens: auto;
  }

  ul, ol {
    margin-bottom: 10pt;
    padding-left: 18pt;
  }

  li {
    font-size: 10.5pt;
    line-height: 1.65;
    text-align: justify;
    margin-bottom: 5pt;
  }

  strong, b { font-weight: 700; }
  em, i     { font-style: italic; }
  u         { text-decoration: underline; }

  .highlight, mark { background-color: transparent; }

  /* ─── BLOCO DE ASSINATURA ─── */
  .signature-block {
    margin-top: 36pt;
    padding-top: 12pt;
    border-top: 1px solid #ccc;
    font-size: 10.5pt;
    line-height: 1.7;
    page-break-inside: avoid;
  }

  .signature-city {
    margin-bottom: 18pt;
  }

  .signature-row {
    display: flex;
    justify-content: space-between;
    gap: 40pt;
    margin-top: 8pt;
  }

  .signature-field {
    flex: 1;
    text-align: center;
  }

  .signature-line {
    border-bottom: 1.5px solid #222;
    width: 100%;
    margin-top: 44pt;
    margin-bottom: 6pt;
  }

  .signature-name {
    font-size: 9.5pt;
    font-weight: 700;
    margin-top: 3pt;
  }

  .signature-doc {
    font-size: 8.5pt;
    color: #555;
    margin-top: 1pt;
  }
</style>
</head>
<body>

  <div class="content">
    {{{conteudo_contrato}}}

    <!-- Bloco de Assinaturas -->
    <div class="signature-block">
      <p class="signature-city">Ribeirão Preto, {{data}}.</p>

      <div class="signature-row">
        <div class="signature-field">
          <div class="signature-line"></div>
          <p class="signature-name">BORA EXPANDIR LTDA</p>
          <p class="signature-doc">CNPJ 55.218.947/0001-65</p>
          <p class="signature-doc">CADASTRUR: 55.218.947/0001-65</p>
        </div>

        <div class="signature-field">
          <div class="signature-marker"></div>
          <div class="signature-line"></div>
          <p class="signature-name">{{nome}}</p>
          <p class="signature-doc">Doc: {{documento}}</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
