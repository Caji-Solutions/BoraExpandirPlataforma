# ============================================
# Nginx site config — API BoraExpandir
# ============================================
# Deploy: copiar para /etc/nginx/sites-available/boraexpandir-api
# Depois: sudo ln -s /etc/nginx/sites-available/boraexpandir-api /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

# Rate limit zone (proteção contra abuso — opcional)
limit_req_zone $binary_remote_addr zone=boraexpandir_api:10m rate=30r/s;

# --- HTTP → vira HTTPS via certbot depois ---
server {
    listen 80;
    listen [::]:80;
    server_name ebe-api.boraexpandir.com.br;

    # Permite challenge do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Tudo mais redireciona para HTTPS (certbot adiciona essa linha depois)
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS (bloco que o certbot vai editar/preencher) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ebe-api.boraexpandir.com.br;

    # Certbot injeta ssl_certificate e ssl_certificate_key aqui automaticamente
    # ssl_certificate /etc/letsencrypt/live/ebe-api.boraexpandir.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ebe-api.boraexpandir.com.br/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload de arquivos grandes (PDFs, contratos, docs)
    client_max_body_size 25M;
    client_body_timeout 60s;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Rate limit leve
    limit_req zone=boraexpandir_api burst=60 nodelay;

    # Proxy para Express (porta 4000)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health endpoint sem rate limit (para monitoring)
    location = /api/ping {
        proxy_pass http://127.0.0.1:4000/api/ping;
        access_log off;
    }
}
